# ============================================
# ROCKET.CHAT TPS - DOCKER COMPOSE
# ============================================

services:
  # ==========================================
  # MONGODB - Base de données
  # ==========================================
  mongo:
    image: mongo:6.0
    container_name: rocket-mongo
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-Admin123!}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-rocketchat}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # ROCKET.CHAT - Instance 1
  # ==========================================
  rocketchat-1:
    build:
      context: .
      dockerfile: docker/rocketchat/Dockerfile
    container_name: rocket-app-1
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads-1:/app/uploads
    environment:
      ROOT_URL: ${ROOT_URL:-http://localhost}
      MONGO_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-Admin123!}@mongo:27017/${MONGO_DATABASE:-rocketchat}?authSource=admin
      MONGO_OPLOG_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-Admin123!}@mongo:27017/local?authSource=admin
      PORT: 3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-Admin456!}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost.local}
      NODE_ENV: ${NODE_ENV:-production}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/info', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal

  # ==========================================
  # ROCKET.CHAT - Instance 2
  # ==========================================
  rocketchat-2:
    build:
      context: .
      dockerfile: docker/rocketchat/Dockerfile
    container_name: rocket-app-2
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - uploads-2:/app/uploads
    environment:
      ROOT_URL: ${ROOT_URL:-http://localhost}
      MONGO_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-Admin123!}@mongo:27017/${MONGO_DATABASE:-rocketchat}?authSource=admin
      MONGO_OPLOG_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-Admin123!}@mongo:27017/local?authSource=admin
      PORT: 3000
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-Admin456!}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@localhost.local}
      NODE_ENV: ${NODE_ENV:-production}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/info', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal

  # ==========================================
  # NGINX + ModSecurity WAF
  # ==========================================
  nginx:
    image: owasp/modsecurity-crs:nginx-alpine
    container_name: rocket-nginx
    restart: unless-stopped
    environment:
      MODSEC_RULE_ENGINE: "On"
      PARANOIA: 1
      ANOMALY_INBOUND: 5
      ANOMALY_OUTBOUND: 4
      PORT: 80
      SSL_PORT: 443
    ports:
      - "${HTTP_PORT:-8080}:80"
      - "${HTTPS_PORT:-8443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - ./docker/nginx/certbot-www:/var/www/certbot:ro
    depends_on:
      - rocketchat-1
      - rocketchat-2
    networks:
      - internal
  # ==========================================
  # DOZZLE - Logs centralisés (UI web)
  # ==========================================
  dozzle:
    image: amir20/dozzle:latest
    container_name: rocket-dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "9999:8080"
    environment:
      DOZZLE_LEVEL: info
      DOZZLE_TAILSIZE: 300
    networks:
      - internal

  # ==========================================
  # RPG BOT SETUP (Auto Deployer)
  # ==========================================
  rpg-setup:
    image: node:18-alpine
    container_name: rocket-rpg-setup
    restart: "no"
    env_file:
      - .env
    volumes:
      - ./:/workspace
    working_dir: /workspace
    # Requires curl and bash for the setup script
    entrypoint: /bin/sh -c "apk add --no-cache curl bash && bash /workspace/scripts/setup.sh"
    depends_on:
      rocketchat-1:
        condition: service_started
    networks:
      - internal

  # ==========================================
  # SAUVEGARDE S3 (Cron Journalier)
  # ==========================================
  s3-backup:
    image: mongo:6.0
    container_name: rocket-s3-backup
    restart: unless-stopped
    env_file:
      - .env
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-eu-west-1}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      MONGO_ROOT_USER: ${MONGO_ROOT_USER:-admin}
      MONGO_ROOT_PASS: ${MONGO_ROOT_PASS:-Admin123!}
      MONGO_DATABASE: ${MONGO_DATABASE:-rocketchat}
    volumes:
      - ./docker/mongodb/backup.sh:/backup.sh:ro
    # mongo:6.0 a mongodump natif ; on installe awscli via pip puis on lance le cron
    entrypoint: >
      /bin/bash -c "
        apt-get update -qq &&
        apt-get install -y --no-install-recommends python3-pip cron > /dev/null &&
        pip3 install --quiet awscli &&
        echo '0 3 * * * root bash /backup.sh >> /var/log/cron.log 2>&1' > /etc/cron.d/s3-backup &&
        chmod 0644 /etc/cron.d/s3-backup &&
        touch /var/log/cron.log &&
        cron &&
        tail -f /var/log/cron.log"
    networks:
      - internal

  # ==========================================
  # CERTBOT (Let's Encrypt Auto-Renewal)
  # ==========================================
  certbot:
    image: certbot/certbot
    container_name: rocket-certbot
    restart: unless-stopped
    volumes:
      - ./docker/nginx/certs:/etc/letsencrypt
      - ./docker/nginx/certbot-www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - internal

  # ==========================================
  # CADVISOR - Metriques containers (CPU/RAM)
  # ==========================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: rocket-cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal

  # ==========================================
  # PROMETHEUS - Collecte des metriques
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: rocket-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - internal

  # ==========================================
  # GRAFANA - Dashboard de surveillance
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: rocket-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-Admin789!}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  mongo-data:
    driver: local
  uploads-1:
    driver: local
  uploads-2:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local