# ============================================
# NGINX - ROCKET.CHAT TPS
# Reverse Proxy + Load Balancer + HTTPS + WAF
# ============================================

upstream rocketchat_backend {
    ip_hash;
    server rocketchat-1:3000 max_fails=3 fail_timeout=30s;
    server rocketchat-2:3000 max_fails=3 fail_timeout=30s;
}

# HTTP → HTTPS redirect
server {
    listen 8080;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host:8443$request_uri;
    }
}

# HTTPS
server {
    listen 8443 ssl http2;
    server_name _;

    ssl_certificate     /etc/nginx/certs/localhost.crt;
    ssl_certificate_key /etc/nginx/certs/localhost.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"           always;
    add_header X-Content-Type-Options     "nosniff"              always;
    add_header X-XSS-Protection           "1; mode=block"        always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    location / {
        proxy_pass         http://rocketchat_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
        client_max_body_size 100M;
    }
}

# Health check interne
server {
    listen 8081;
    server_name _;

    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
