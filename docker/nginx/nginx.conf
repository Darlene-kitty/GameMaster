# ============================================
# NGINX - ROCKET.CHAT TPS
# Reverse Proxy + Load Balancer + HTTPS Ready
# ============================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Optimisations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ========================================
    # UPSTREAM : LOAD BALANCER (2 instances)
    # ========================================
    upstream rocketchat_backend {
        ip_hash;  # Important pour WebSockets
        server rocketchat-1:3000 max_fails=3 fail_timeout=30s;
        server rocketchat-2:3000 max_fails=3 fail_timeout=30s;
    }

    # ========================================
    # HTTP → HTTPS (Redirection)
    # ========================================
    server {
        listen 80;
        server_name _;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ========================================
    # HTTPS SERVER
    # ========================================
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL (sera configuré par Certbot)
        ssl_certificate /etc/letsencrypt/live/rocketchat/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/rocketchat/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Headers de sécurité
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location / {
            proxy_pass http://rocketchat_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
        }
    }

    # ========================================
    # HEALTH CHECK ENDPOINT
    # ========================================
    server {
        listen 8080;
        server_name _;
        
        location /health {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }
} 
