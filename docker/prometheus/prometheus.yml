global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Métriques des containers (CPU, RAM, réseau, disque)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Métriques Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
