global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Métriques des containers (CPU, RAM, réseau, disque)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  # Métriques Prometheus lui-même
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Métriques Rocket.Chat instance 1
  - job_name: 'rocketchat-1'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rocketchat-1:3000']
        labels:
          instance: 'rocketchat-1'
          service: 'rocketchat'

  # Métriques Rocket.Chat instance 2
  - job_name: 'rocketchat-2'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rocketchat-2:3000']
        labels:
          instance: 'rocketchat-2'
          service: 'rocketchat'

  # Métriques MongoDB via mongoexporter (si déployé)
  # - job_name: 'mongodb'
  #   static_configs:
  #     - targets: ['mongo-exporter:9216']
